<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Ambassador Hub — PhiXtra{% endblock %}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6fa;color:#030C18;min-height:100vh;display:flex}
    :root{--ink:#030C18;--line:#e8eaf0;--muted:#7a8096;--good:#16a34a;--warn:#d97706;--bad:#dc2626;--brand:#030C18;--brand-light:#f0f1f8}
    a{color:inherit;text-decoration:none}

    /* Sidebar */
    .amb-sidebar{width:220px;min-height:100vh;background:var(--ink);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:100}
    .asb-brand{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
    .asb-brand-name{color:#fff;font-size:15px;font-weight:800;letter-spacing:-.3px}
    .asb-brand-sub{color:rgba(255,255,255,.5);font-size:11px;margin-top:2px}
    .asb-nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:2px}
    .asb-link{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;color:rgba(255,255,255,.65);font-size:13px;font-weight:500;transition:background .15s,color .15s;cursor:pointer}
    .asb-link:hover,.asb-link.active{background:rgba(255,255,255,.1);color:#fff}
    .asb-icon{font-size:15px;width:20px;text-align:center}
    .asb-footer{padding:16px 10px;border-top:1px solid rgba(255,255,255,.1)}
    .asb-logout{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;color:rgba(255,255,255,.5);font-size:13px;font-weight:500;cursor:pointer}
    .asb-logout:hover{color:#fff;background:rgba(255,255,255,.08)}

    /* Main */
    .amb-main{margin-left:220px;flex:1;padding:32px;min-height:100vh}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .section-title{font-size:22px;font-weight:800;letter-spacing:-.4px}

    /* Cards */
    .card{background:#fff;border-radius:16px;border:1px solid var(--line);padding:20px}
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:20px}
    .stat-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px}
    .stat-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:6px}
    .stat-value{font-size:24px;font-weight:800;letter-spacing:-.5px}
    .stat-sub{font-size:12px;color:var(--muted);margin-top:3px}

    /* Table */
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:10px 14px;border-bottom:2px solid var(--line)}
    td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    .muted{color:var(--muted)}

    /* Pills */
    .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
    .pill-green{background:#dcfce7;color:#15803d}
    .pill-grey{background:#f1f5f9;color:#64748b}
    .pill-warn{background:#fef9c3;color:#92400e}
    .pill-red{background:#fee2e2;color:#991b1b}
    .pill-blue{background:#dbeafe;color:#1d4ed8}

    /* Buttons */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;text-decoration:none;transition:background .15s}
    .btn:hover{background:#f8f9fb}
    .btn-primary{background:var(--ink);color:#fff;border-color:var(--ink)}
    .btn-primary:hover{background:#1a2535}
    .btn-sm{padding:5px 12px;font-size:12px}

    /* Flash */
    .flash{padding:12px 16px;border-radius:10px;margin-bottom:20px;font-size:13px;font-weight:500}
    .flash.success{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}
    .flash.warning{background:#fef9c3;color:#92400e;border:1px solid #fde68a}
    .flash.danger{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}

    /* Tier progress bar */
    .tier-bar-wrap{margin:16px 0}
    .tier-track{height:6px;background:var(--line);border-radius:4px;margin:8px 0;position:relative}
    .tier-fill{height:6px;background:var(--ink);border-radius:4px;transition:width .4s}
    .tier-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);font-weight:600}

    @media(max-width:768px){
      .amb-sidebar{width:60px}
      .asb-brand-name,.asb-brand-sub,.asb-link span,.asb-logout span{display:none}
      .amb-main{margin-left:60px;padding:20px}
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<nav class="amb-sidebar">
  <div class="asb-brand">
    <div class="asb-brand-name">PhiXtra AI</div>
    <div class="asb-brand-sub">Ambassador Hub</div>
  </div>
  <div class="asb-nav">
    <a class="asb-link {% if request.endpoint=='ambassador.dashboard' %}active{% endif %}"
       href="{{ url_for('ambassador.dashboard') }}">
      <span class="asb-icon">🏠</span><span>Dashboard</span>
    </a>
    <a class="asb-link {% if request.endpoint=='ambassador.referrals' %}active{% endif %}"
       href="{{ url_for('ambassador.referrals') }}">
      <span class="asb-icon">👥</span><span>My Referrals</span>
    </a>
    <a class="asb-link {% if request.endpoint=='ambassador.earnings' %}active{% endif %}"
       href="{{ url_for('ambassador.earnings') }}">
      <span class="asb-icon">💰</span><span>Earnings</span>
    </a>
    <a class="asb-link {% if request.endpoint=='ambassador.qr_page' %}active{% endif %}"
       href="{{ url_for('ambassador.qr_page') }}">
      <span class="asb-icon">📱</span><span>My QR Code</span>
    </a>
  </div>
  <div class="asb-footer">
    <a class="asb-logout" href="{{ url_for('ambassador.logout') }}">
      <span class="asb-icon">⎋</span><span>Logout</span>
    </a>
  </div>
</nav>

<main class="amb-main">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash {{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>

</body>
</html>
