{% extends "school/onboarding_base.html" %}
{% block title %}School Profile — Setup{% endblock %}

{% block content %}
<div class="card">
  <div class="card-title">Tell us about your school</div>
  <div class="card-sub">This information appears in parent-facing messages. You can update it anytime in Settings.</div>

  <form method="POST">
    <div class="form-row g2">
      <div class="form-group">
        <label>School Name <span style="color:var(--bad)">*</span></label>
        <input type="text" name="school_name" required
               value="{{ school.school_name or '' }}"
               placeholder="e.g. Greenfield Academy">
      </div>
      <div class="form-group">
        <label>School Type</label>
        <select name="school_type">
          {% for v,l in [('nursery','Nursery/Primary'),('secondary','Secondary (JSS/SSS)'),('tertiary','Tertiary'),('vocational','Vocational')] %}
          <option value="{{ v }}" {% if school.school_type == v %}selected{% endif %}>{{ l }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-row g2">
      <div class="form-group">
        <label>Principal / Head Teacher</label>
        <input type="text" name="principal_name"
               value="{{ school.principal_name or '' }}"
               placeholder="Full name">
      </div>
      <div class="form-group">
        <label>State</label>
        <input type="text" name="state"
               value="{{ school.state or '' }}"
               placeholder="e.g. Lagos">
      </div>
    </div>

    <div class="form-row g2">
      <div class="form-group">
        <label>LGA</label>
        <input type="text" name="lga"
               value="{{ school.lga or '' }}"
               placeholder="e.g. Ikeja">
      </div>
      <div class="form-group">
        <label>School Address</label>
        <input type="text" name="address"
               value="{{ school.address or '' }}"
               placeholder="Street / area">
      </div>
    </div>

    <div class="divider"></div>

    <div style="margin-bottom:8px;font-size:12.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">
      Current Academic Period
    </div>
    <div class="form-row g2">
      <div class="form-group">
        <label>Session</label>
        <input type="text" name="current_session"
               value="{{ school.current_session or '2025/2026' }}"
               placeholder="2025/2026">
      </div>
      <div class="form-group">
        <label>Term</label>
        <select name="current_term">
          {% for t in ['First','Second','Third'] %}
          <option value="{{ t }}" {% if school.current_term == t %}selected{% endif %}>{{ t }} Term</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div style="margin-top:24px;display:flex;gap:10px;justify-content:flex-end">
      <button type="submit" class="btn btn-primary">
        Save &amp; Continue →
      </button>
    </div>
  </form>
</div>
{% endblock %}
