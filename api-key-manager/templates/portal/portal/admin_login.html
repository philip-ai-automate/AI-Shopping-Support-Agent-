{% extends "portal/base.html" %}
{% block title %}Admin Login — PhiXtra{% endblock %}
{% block wrap_class %}page-sm{% endblock %}
{% block content %}
<div class="card" style="margin-top:12px">
  <h1 style="font-size:22px;font-weight:800;margin-bottom:6px">Admin login</h1>
  <p class="muted" style="margin-bottom:22px">PhiXtra staff only.</p>
  <form method="POST" action="{{ url_for('portal_admin.login') }}">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" required autofocus/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required/>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Log in</button>
  </form>
</div>
{% endblock %}
