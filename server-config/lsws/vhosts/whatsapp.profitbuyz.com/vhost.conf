docRoot                   $VH_ROOT/public_html
vhDomain                  $VH_NAME
vhAliases                 www.$VH_NAME
adminEmails               info@profitbuyz.com
enableGzip                1
enableIpGeo               1

index  {
  useServer               0
  indexFiles              index.php, index.html
}

errorlog $VH_ROOT/logs/$VH_NAME.error_log {
  useServer               0
  logLevel                WARN
  rollingSize             10M
}

accesslog $VH_ROOT/logs/$VH_NAME.access_log {
  useServer               0
  logFormat               "%h %l %u %t "%r" %>s %b "%{Referer}i" "%{User-Agent}i""
  logHeaders              5
  rollingSize             10M
  keepDays                10
  compressArchive         1
}

extprocessor chatwoot {
  type                    proxy
  address                 http://127.0.0.1:4000
  maxConns                100
  initTimeout             60
  retryTimeout            0
  persistConn             1
  pcKeepAliveTimeout      60
  respBuffer              0
}

extprocessor phixtra_wa {
  type                    proxy
  address                 http://127.0.0.1:8001
  maxConns                50
  initTimeout             60
  retryTimeout            0
  persistConn             1
  pcKeepAliveTimeout      60
  respBuffer              0
}

context /meta-webhook {
  type                    proxy
  handler                 phixtra_wa
  addDefaultCharset       off
}

context /wa-cart-recovery {
  type                    proxy
  handler                 phixtra_wa
  addDefaultCharset       off
}

context /wa-order-update {
  type                    proxy
  handler                 phixtra_wa
  addDefaultCharset       off
}

context /health {
  type                    proxy
  handler                 phixtra_wa
  addDefaultCharset       off
}

context / {
  type                    proxy
  handler                 chatwoot
  addDefaultCharset       off
}

rewrite  {
  enable                  1
  autoLoadHtaccess        1
}

context /.well-known/acme-challenge {
  location                /usr/local/lsws/Example/html/.well-known/acme-challenge
  allowBrowse             1

  rewrite  {
     enable                  0
  }
  addDefaultCharset       off

  phpIniOverride  {

  }
}


vhssl  {
  keyFile                 /etc/letsencrypt/live/whatsapp.profitbuyz.com/privkey.pem
  certFile                /etc/letsencrypt/live/whatsapp.profitbuyz.com/fullchain.pem
  certChain               1
  sslProtocol             24
  enableECDHE             1
  renegProtection         1
  sslSessionCache         1
  enableSpdy              15
  enableStapling           1
  ocspRespMaxAge           86400
}
